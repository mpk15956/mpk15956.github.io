project:
  type: website
  resources:
    - cv.pdf
    - favicon.svg
    - favicon.ico
    - apple-touch-icon.png
    - og-card.png
  pre-render:
    - quarto render _cv-source/cv.qmd
    - cp _cv-source/cv.pdf cv.pdf

website:
  title: "Michael P. Kerr"
  site-url: "https://mpk15956.github.io/"
  description: "Undergraduate researcher in applied mathematics and geography at UGA. Topological data analysis, scientific machine learning, and geospatial modeling."
  image: og-card.png
  open-graph: true
  twitter-card: true
  search: false
  page-footer: "Copyright 2026, Michael P. Kerr"
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Home
      - projects.qmd

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    canonical-url: true
    include-in-header:
      - person.html
      - search-verification.html
      - icons.html
    include-after-body: nav-overlay.html

execute:
  freeze: auto
