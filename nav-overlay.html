<script>
document.addEventListener('DOMContentLoaded', function() {
  var navEl = document.getElementById('navbarCollapse');
  if (!navEl) return;

  var backdrop = document.createElement('div');
  backdrop.className = 'nav-backdrop';
  document.body.appendChild(backdrop);

  navEl.addEventListener('show.bs.collapse', function() {
    backdrop.classList.add('show');
  });

  navEl.addEventListener('hide.bs.collapse', function() {
    backdrop.classList.remove('show');
  });

  backdrop.addEventListener('click', function() {
    bootstrap.Collapse.getInstance(navEl).hide();
  });
});

// Prevent mailto: links in the about sidebar from opening a mail client
document.querySelectorAll('.about-link[href^="mailto:"]').forEach(function(link) {
  link.addEventListener('click', function(e) { e.preventDefault(); });
});
</script>
